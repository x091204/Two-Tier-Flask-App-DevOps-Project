<!DOCTYPE html>
<html>
<head>
    <title>Student Records</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Student Records</h1>

<a href="/add">Add Student</a>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Roll No</th>
<th>Grade</th>
<th>Actions</th>
</tr>

{% for student in students %}
<tr>
<td>{{student[0]}}</td>
<td>{{student[1]}}</td>
<td>{{student[2]}}</td>
<td>{{student[3]}}</td>
<td>
    <a href="/delete/{{student[0]}}" onclick="return confirm('Delete this student?')">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
